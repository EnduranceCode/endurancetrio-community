# Build and publish Docker images.
#
# Repository topology:
#  - Source development happens in: EnduranceCode/endurancetrio-community
#  - Releases/images are published from: endurancetrio/endurancetrio-community
#
# Requirements:
#  - Add GHCR_USERNAME and GHCR_SECRET as repository secrets where this workflow runs.
#  - GHCR_SECRET must have permission to write packages in the target GHCR namespace.
#  - Setup and renewal guide: docs/development.md#ghcr-credentials-setup-and-renewal
#

name: Build and Publish Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      build-tag-suffix:
        description: 'Suffix to append to the image tag (e.g., staging-fix-login)'
        required: true
        type: string
      ref:
        description: 'Branch, tag, or SHA to build from (defaults to master)'
        required: false
        default: 'master'
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # For workflow_dispatch: checkout the user-specified ref.
          # For release events: github.event.inputs is undefined, so
          # the checkout action defaults to the release commit.
          ref: ${{ github.event.inputs.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: ./mvnw package

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_SECRET }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 1. Release Tag (git tag: community-vX.Y.Z → Docker tag: X.Y.Z)
            # Conditions: ONLY run if the event is 'release'.
            type=match,pattern=community-v(\d+\.\d+\.\d+),group=1,enable=${{ github.event_name == 'release' }}

            # 2. Short SHA Tag (Manual builds)
            # Conditions: ONLY run if the event is 'workflow_dispatch'
            type=raw,value=sha-{{sha}}-${{ github.event.inputs.build-tag-suffix }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.vendor=EnduranceTrio
            org.opencontainers.image.authors=Ricardo do Canto <https://github.com/EnduranceCode>
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
