services:
  postgres:
    container_name: endurancetrio-postgres
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_ROOT_PASSWORD}
      POSTGRES_USER: postgres
      TZ: UTC
      STG_DB_USERNAME: ${STG_DB_USERNAME}
      STG_DB_SECRET: ${STG_DB_SECRET}
      PRD_DB_USERNAME: ${PRD_DB_USERNAME}
      PRD_DB_SECRET: ${PRD_DB_SECRET}
    networks:
      - endurancetrio-community
    ports:
      - "127.0.0.1:${POSTGRES_EXT_PORT:-5432}:5432"
    volumes:
      - ./db:/var/lib/postgresql
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  stg-endurancetrio-community:
    container_name: stg-endurancetrio-community
    image: ghcr.io/endurancetrio/endurancetrio-community:${STG_VERSION}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev
      PUID: ${PUID}
      PGID: ${PGID}
      JAVA_XMS: ${STG_JAVA_XMS:-512m}
      JAVA_XMX: ${STG_JAVA_XMX:-768m}
      DB_URL: ${STG_DB_URL}
      DB_USERNAME: ${STG_DB_USERNAME}
      DB_SECRET: ${STG_DB_SECRET}
      CORS_ALLOWED_ORIGINS: ${STG_CORS_ALLOWED_ORIGINS}
      KOFI_USER_ID: ${KOFI_USER_ID:-}
      FACEBOOK_PAGE_ID: ${FACEBOOK_PAGE_ID:-}
      TWITTER_SITE: ${TWITTER_SITE:-}
      GOOGLE_ADSENSE_ID: ${GOOGLE_ADSENSE_ID:-}
      KIT_API_KEY: ${KIT_API_KEY:-}
      KIT_FORM_ID_EN: ${KIT_FORM_ID_EN:-}
      KIT_FORM_ID_PT: ${KIT_FORM_ID_PT:-}
      FIRST_OWNER: ${FIRST_OWNER:-}
      FIRST_HASH: ${FIRST_HASH:-}
    networks:
      - endurancetrio-community
    ports:
      - "127.0.0.1:${STG_ENDURANCETRIO_EXT_PORT}:8080"
    volumes:
      - ./logs/stg:/opt/endurancetrio-community/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  prd-endurancetrio-community:
    container_name: prd-endurancetrio-community
    image: ghcr.io/endurancetrio/endurancetrio-community:${PRD_VERSION}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PUID: ${PUID}
      PGID: ${PGID}
      JAVA_XMS: ${PRD_JAVA_XMS:-768m}
      JAVA_XMX: ${PRD_JAVA_XMX:-1024m}
      DB_URL: ${PRD_DB_URL}
      DB_USERNAME: ${PRD_DB_USERNAME}
      DB_SECRET: ${PRD_DB_SECRET}
      CORS_ALLOWED_ORIGINS: ${PRD_CORS_ALLOWED_ORIGINS}
      KOFI_USER_ID: ${KOFI_USER_ID:-}
      FACEBOOK_PAGE_ID: ${FACEBOOK_PAGE_ID:-}
      TWITTER_SITE: ${TWITTER_SITE:-}
      GOOGLE_ADSENSE_ID: ${GOOGLE_ADSENSE_ID:-}
      KIT_API_KEY: ${KIT_API_KEY:-}
      KIT_FORM_ID_EN: ${KIT_FORM_ID_EN:-}
      KIT_FORM_ID_PT: ${KIT_FORM_ID_PT:-}
      FIRST_OWNER: ${FIRST_OWNER:-}
      FIRST_HASH: ${FIRST_HASH:-}
    networks:
      - endurancetrio-community
    ports:
      - "127.0.0.1:${PRD_ENDURANCETRIO_EXT_PORT}:8080"
    volumes:
      - ./logs/prd:/opt/endurancetrio-community/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  endurancetrio-community:
    name: endurancetrio-community
    driver: bridge
