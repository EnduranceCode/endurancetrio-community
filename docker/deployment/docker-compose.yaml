services:
  endurancetrio-community:
    container_name: endurancetrio-community
    image: ghcr.io/endurancetrio/endurancetrio-community:${VERSION}
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - endurancetrio-community
    ports:
      - "127.0.0.1:${ENDURANCETRIO_EXT_PORT}:${ENDURANCETRIO_INT_PORT}"
    volumes:
      - ./logs:/opt/endurancetrio-community/logs
    healthcheck:
      test: ["CMD", "/usr/bin/curl", "-f", "http://localhost:${ENDURANCETRIO_INT_PORT}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
networks:
  endurancetrio-community:
    name: endurancetrio-community
    driver: bridge
