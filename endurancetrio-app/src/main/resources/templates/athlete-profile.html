<html data-th-lang="${#locale.language}" lang="en" class="has-endurance-navbar-fixed-top">
<head data-th-replace="~{fragments/head :: head(${metadata})}">
  <title></title>
</head>

<body>
<template data-th-replace="~{fragments/head :: googleTagManager}"></template>

<nav data-th-replace="~{fragments/main-navbar :: main-navbar(${metadata})}"></nav>

<main>
  <section class="hero has-background-grey-700">
    <div class="hero-body">
      <div class="container is-fullhd">
        <div class="endurance-media">
          <div class="endurance-media-left">
            <div class="endurance-box is is-branded-thick is-b">
              <figure class="image is-96x96">
                <div data-th-if="${athlete.gender().getCode() == 'MALE'}" data-th-remove="tag">
                  <img data-th-replace="~{fragments/svg :: mdi-face-man}" alt="Male athlete icon">
                </div>
                <div data-th-if="${athlete.gender().getCode() == 'FEMALE'}" data-th-remove="tag">
                  <img data-th-replace="~{fragments/svg :: mdi-face-woman}" alt="Female athlete icon">
                </div>
              </figure>
            </div>
          </div>

          <div class="endurance-media-content">
            <div class="level">
              <div class="level-left">
                <div class="level-item">
                  <div>
                    <h1 data-th-text="${athlete.knownName()}" class="title is-2 has-text-centered-mobile">
                    </h1>
                    <p data-th-text="${athlete.longName()}" class="subtitle is-4 has-text-centered-mobile">
                    </p>
                    <p data-th-if="${athlete.birthName() != null}"
                       data-th-text="${athlete.birthName()}"
                       class="subtitle is-5 has-text-grey has-text-centered-mobile">
                    </p>
                  </div>
                </div>
              </div>
            </div>

            <div data-th-if="${athlete.country() != null || athlete.yearOfBirth() != null}"
                 class="endurance-media-footer">
              <!-- Level Visible on Mobile & Hidden on Tablet and Superior -->
              <div class="level is-mobile is-hidden-tablet">
                <div data-th-if="${athlete.country() != null}" class="level-item">
                  <p data-th-text="${#locale.language == 'pt' ? athlete.country().getNamePT() : athlete.country().getNameEN()}"
                     class="subtitle is-5">
                  </p>
                </div>
                <div data-th-if="${athlete.yearOfBirth() != null}" class="level-item">
                  <p data-th-text="${athlete.yearOfBirth()}" class="subtitle is-5"></p>
                </div>
              </div>
              <!-- Level Hidden on Mobile & Visible on Tablet and Superior -->
              <div class="level is-hidden-mobile">
                <div class="level-left">
                  <div data-th-if="${athlete.country() != null}" class="level-item">
                    <p data-th-text="${#locale.language == 'pt' ? athlete.country().getNamePT() : athlete.country().getNameEN()}"
                       class="subtitle is-5">
                    </p>
                  </div>
                  <div data-th-if="${athlete.yearOfBirth() != null}" class="level-item">
                    <p data-th-text="${athlete.yearOfBirth()}" class="subtitle is-5"></p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section data-th-with="RaceType=${T(com.endurancetrio.data.event.model.enumerator.RaceType)}"
           class="section">
    <div class="container is-fullhd">
      <div data-th-if="${pagination.totalItems() == 0}"
           class="endurance-box is-branded-thin has-text-centered">
        <p data-th-text="#{page.athlete.profile.empty}" class="title is-4 m-4"></p>
      </div>

      <div data-th-unless="${pagination.totalItems() == 0}" data-th-remove="tag">
        <h2 data-th-text="#{page.athlete.profile.races.title}" class="title is-2"></h2>
      </div>

      <a data-th-each="race : ${races}"
         data-th-with="isDerived=${race.raceType == RaceType.INDIVIDUAL_DERIVED || race.raceType == RaceType.TEAM_RELAY_DERIVED || race.raceType == RaceType.MIXED_RELAY_DERIVED}"
         data-th-href="@{/{lang}/events/{year}/{eventId}/results/{raceId}(lang=${language}, year=${#temporals.year(race.event.startDate)}, eventId=${race.event.id}, raceId=${race.id})}"
         class="endurance-box is-branded-thin mb-3">
        <div data-th-classappend="${isDerived} ? 'has-background-grey-100' : p-0"
             class="box is-shadowless">
          <div class="endurance-media">
            <div class="endurance-media-left has-background-grey-700">
              <p data-th-text="${#temporals.format(race.date, 'dd-MM')}"
                 data-th-classappend="${isDerived} ? is-5 : is-3"
                 class="title mb-0">
              </p>
              <p data-th-text="${#temporals.format(race.date, 'yyyy')}"
                 data-th-classappend="${isDerived} ? is-6 : is-4"
                 class="subtitle mb-0 has-text-weight-bold">
              </p>
            </div>
            <div class="endurance-media-content">
              <p data-th-text="${race.title}"
                 data-th-classappend="${isDerived} ? 'has-text-grey-dark is-5' : 'is-3'"
                 class="title"></p>
              <p data-th-text="${race.subtitle}"
                 data-th-classappend="${isDerived} ? 'has-text-grey-dark is-6' : 'is-5'"
                 class="subtitle"></p>
              <p class="endurance-media-footer">
                <span data-th-each="sportCode : ${race.sports}"
                      data-th-text="#{sport.__${sportCode}__}"
                      data-th-classappend="${!isDerived} ? 'is-medium'"
                      class="tag is-link is-light">
                </span>
              </p>
            </div>
          </div>
        </div>
      </a>

      <nav data-th-if="${pagination.totalPages() > 1}"
           class="pagination is-centered is-rounded" role="navigation"
      >
        <a data-th-classappend="${!pagination.hasPrevious()} ? 'is-disabled'"
           data-th-attr="disabled=${!pagination.hasPrevious()} ? 'disabled' : null"
           data-th-href="${pagination.hasPrevious()}
             ? @{/{lang}/athletes/{id}(lang=${language}, id=${athlete.id()}, page=${pagination.pageNumber() - 1})}
             : null"
           class="pagination-previous"
        >
          <span class="icon">
            <i class="et et-chevron-double-left"></i>
          </span>
        </a>

        <a data-th-classappend="${!pagination.hasNext()} ? 'is-disabled'"
           data-th-attr="disabled=${!pagination.hasNext()} ? 'disabled' : null"
           data-th-href="${pagination.hasNext()}
             ? @{/{lang}/athletes/{id}(lang=${language}, id=${athlete.id()}, page=${pagination.pageNumber() + 1})}
             : null"
           class="pagination-next"
        >
          <span class="icon">
            <i class="et et-chevron-double-right"></i>
          </span>
        </a>
      </nav>
    </div>

    <div data-th-if="${!#lists.isEmpty(articles)}" class="container is-fullhd mt-6">
      <h2 data-th-text="#{page.athlete.profile.insights.title}" class="title is-2"></h2>

      <a data-th-each="article : ${articles}"
         data-th-href="@{/{lang}/insights/{slug}(lang=${language}, slug=${article.slug})}"
         class="endurance-box is-branded-thin">
        <div class="endurance-media">
          <div class="endurance-media-left is-og-320x167 ">
            <img data-th-src="${article.featuredImage}"
                 data-th-alt="${article.title}"
                 alt="Article Title"/>
          </div>
          <div class="endurance-media-content">
            <p data-th-text="${article.title}" class="title is-3"></p>
            <div class="subtitle is-5">
              <p data-th-utext="${article.introText}" data-th-remove="tag"></p>
            </div>
            <div data-th-if="${article.publishedDate != null}" class="endurance-media-footer">
              <p data-th-text="${#temporals.format(article.publishedDate, 'dd MMMM yyyy')}"></p>
            </div>
          </div>
        </div>
      </a>
    </div>
  </section>
</main>

<footer data-th-replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
