<html data-th-lang="${#locale.language}" lang="en" class="has-endurance-navbar-fixed-top">
<head data-th-replace="~{fragments/head :: head(${metadata})}">
  <title></title>
</head>

<body>
<template data-th-replace="~{fragments/head :: googleTagManager}"></template>

<nav data-th-replace="~{fragments/main-navbar :: main-navbar(${metadata})}"></nav>

<main class="section">
  <section class="container is-fluid">
    <h1 data-th-text="#{page.events.title}" class="title is-1">Event's years</h1>

    <div class="is-hidden-desktop">
      <div class="fixed-grid has-1-cols">
        <div class="grid">
          <div class="cell" data-th-each="year : ${eventYears.years}">
            <a data-th-href="@{/{lang}/events/{year}(lang=${language}, year=${year})}"
               class="endurance-box-branded is-branded-faded is-clickable has-background-grey-200 has-text-centered">
              <span class="title is-1" data-th-text="${year}">1984</span>
            </a>
          </div>
        </div>
      </div>

      <nav class="pagination is-centered is-rounded" role="navigation"
           aria-label="pagination" data-th-if="${eventYears.totalBatches > 1}">
        <a class="pagination-previous"
           data-th-classappend="${eventYears.currentPage == 0} ? 'is-disabled'"
           data-th-attr="disabled=${eventYears.currentPage == 0} ? 'disabled' : null"
           data-th-href="${eventYears.currentPage > 0}
           ? @{/{lang}/events(lang=${language}, page=${eventYears.currentPage - 1})}
           : null">
          <span class="icon">
            <i class="et et-chevron-double-left"></i>
          </span>
        </a>
        <a class="pagination-next"
           data-th-classappend="${eventYears.currentPage >= eventYears.totalBatches - 1} ? 'is-disabled'"
           data-th-attr="disabled=${eventYears.currentPage >= eventYears.totalBatches - 1} ? 'disabled' : null"
           data-th-href="${eventYears.currentPage < eventYears.totalBatches - 1}
           ? @{/{lang}/events(lang=${language}, page=${eventYears.currentPage + 1})}
           : null">
          <span class="icon">
            <i class="et et-chevron-double-right"></i>
          </span>
        </a>
      </nav>
    </div>

    <div class="is-hidden-touch">
      <div class="fixed-grid has-3-cols">
        <div data-th-if="${!eventYears.nextYears.isEmpty()}" class="grid">
          <div class="cell" data-th-each="year : ${eventYears.years}">
            <a data-th-href="@{/{lang}/events/{year}(lang=${language}, year=${year})}"
               class="endurance-box-branded is-branded-faded is-clickable has-background-grey-200 has-text-centered">
              <span class="title is-1" data-th-text="${year}">1984</span>
            </a>
          </div>
          <div class="cell" data-th-each="year : ${eventYears.nextYears}"
               data-th-classappend="${yearStat.last ? (eventYears.nextYears.size() == 2 ? 'is-col-span-2' : (eventYears.nextYears.size() == 1 ? 'is-col-span-3' : '')) : ''}">
            <a data-th-href="@{/{lang}/events/{year}(lang=${language}, year=${year})}"
               class="endurance-box-branded is-branded-faded is-clickable has-background-grey-200 has-text-centered">
              <span class="title is-1" data-th-text="${year}">1984</span>
            </a>
          </div>
        </div>

        <div data-th-if="${eventYears.nextYears.isEmpty()}" class="grid">
          <div class="cell" data-th-each="year : ${eventYears.previousYears}">
            <a data-th-href="@{/{lang}/events/{year}(lang=${language}, year=${year})}"
               class="endurance-box-branded is-branded-faded is-clickable has-background-grey-200 has-text-centered">
              <span class="title is-1" data-th-text="${year}">1984</span>
            </a>
          </div>
          <div class="cell" data-th-each="year : ${eventYears.years}"
               data-th-classappend="${yearStat.last ? (eventYears.years.size() == 2 ? 'is-col-span-2' : (eventYears.years.size() == 1 ? 'is-col-span-3' : '')) : ''}">
            <a data-th-href="@{/{lang}/events/{year}(lang=${language}, year=${year})}"
               class="endurance-box-branded is-branded-faded is-clickable has-background-grey-200 has-text-centered">
              <span class="title is-1" data-th-text="${year}">1984</span>
            </a>
          </div>
        </div>
      </div>

      <nav class="pagination is-centered is-rounded" role="navigation"
           aria-label="pagination" data-th-if="${eventYears.totalBatches > 2}">
        <a class="pagination-previous"
           data-th-classappend="${eventYears.batchGroupPreviousPage < 0} ? 'is-disabled'"
           data-th-attr="disabled=${eventYears.batchGroupPreviousPage < 0} ? 'disabled' : null"
           data-th-href="${eventYears.batchGroupPreviousPage >= 0}
           ? @{/{lang}/events(lang=${language}, page=${eventYears.batchGroupPreviousPage})}
           : null">
          <span class="icon">
            <i class="et et-chevron-double-left"></i>
          </span>
        </a>
        <a class="pagination-next"
           data-th-classappend="${eventYears.batchGroupNextPage < 0} ? 'is-disabled'"
           data-th-attr="disabled=${eventYears.batchGroupNextPage < 0} ? 'disabled' : null"
           data-th-href="${eventYears.batchGroupNextPage >= 0}
           ? @{/{lang}/events(lang=${language}, page=${eventYears.batchGroupNextPage})}
           : null">
          <span class="icon">
            <i class="et et-chevron-double-right"></i>
          </span>
        </a>
      </nav>
    </div>
  </section>
</main>

<footer data-th-replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
