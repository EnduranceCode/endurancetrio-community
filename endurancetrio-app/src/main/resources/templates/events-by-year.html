<html data-th-lang="${#locale.language}" lang="en" class="has-endurance-navbar-fixed-top">
<head data-th-replace="~{fragments/head :: head(${metadata})}">
  <title></title>
</head>

<body>
<template data-th-replace="~{fragments/head :: googleTagManager}"></template>

<nav data-th-replace="~{fragments/main-navbar :: main-navbar(${metadata})}"></nav>

<main class="section">
  <section class="container is-fluid">
    <h1 data-th-text="#{page.events.year.title(${#strings.toString(year)})}" class="title is-1">
      Events in 1984
    </h1>

    <div data-th-if="${pagination.totalItems() == 0}" class="has-text-centered mt-6">
      <p data-th-text="#{page.events.year.empty(${#strings.toString(year)})}" class="subtitle is-5">
        No events found for 1984
      </p>
    </div>

    <div data-th-each="event : ${events}" class="endurance-box is-branded-thin mb-3">
      <article class="media">
        <div class="media-left">
          <div class="box has-background-grey-700 has-text-centered"
               style="min-width: 4.5rem; padding: 0.5rem;">
            <p class="title is-3 mb-0" data-th-text="${#temporals.format(event.startDate, 'dd')}">
              15
            </p>
            <p class="subtitle is-7 mb-0 has-text-weight-bold"
               data-th-text="${#temporals.format(event.startDate, 'MMM')}">
              Aug
            </p>
          </div>
        </div>

        <div class="media-content">
          <div class="content">
            <a data-th-href="@{/{lang}/events/{year}/{id}/overview(lang=${language}, year=${year}, id=${event.id})}">
              <span data-th-text="${event.title}" class="title is-4"></span>
              <br>
              <span class="has-text-grey"
                    data-th-text="${event.city} + ', ' + ${event.county} + ' (' + ${event.district} + ')'">
              </span>
            </a>
            <div class="tags mt-2" data-th-if="${!#lists.isEmpty(event.sportCodes)}">
              <span class="tag is-link is-light" data-th-each="sportCode : ${event.sportCodes}"
                    data-th-text="#{sport.__${sportCode}__}">
              </span>
            </div>
          </div>
        </div>
      </article>
    </div>

    <nav class="pagination is-centered is-rounded" role="navigation"
         data-th-if="${pagination.totalPages() > 1}">
      <a class="pagination-previous"
         data-th-classappend="${!pagination.hasPrevious()} ? 'is-disabled'"
         data-th-attr="disabled=${!pagination.hasPrevious()} ? 'disabled' : null"
         data-th-href="${pagination.hasPrevious()}
           ? @{/{lang}/events/{year}(lang=${language}, year=${year}, page=${pagination.pageNumber() - 1})}
           : null">
        <span class="icon">
          <i class="et et-chevron-double-left"></i>
        </span>
      </a>

      <a class="pagination-next"
         data-th-classappend="${!pagination.hasNext()} ? 'is-disabled'"
         data-th-attr="disabled=${!pagination.hasNext()} ? 'disabled' : null"
         data-th-href="${pagination.hasNext()}
           ? @{/{lang}/events/{year}(lang=${language}, year=${year}, page=${pagination.pageNumber() + 1})}
           : null">
        <span class="icon">
          <i class="et et-chevron-double-right"></i>
        </span>
      </a>
    </nav>
  </section>
</main>

<footer data-th-replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
