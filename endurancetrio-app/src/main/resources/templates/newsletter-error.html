<html data-th-lang="${#locale.language}" lang="en" class="has-endurance-navbar-fixed-top">
<head data-th-replace="~{fragments/head :: head(${metadata})}">
  <title></title>
</head>

<body>
<template data-th-replace="~{fragments/head :: googleTagManager}"></template>

<nav data-th-replace="~{fragments/main-navbar :: main-navbar(${metadata})}"></nav>

<main class="section">
  <section class="container">
    <div class="box has-text-centered">
      <span class="icon is-large has-text-danger">
        <i class="fas fa-times-circle fa-2x"></i>
      </span>
      <h1 data-th-text="#{page.newsletter.newsletter-error.title}"
          class="title is-3 mt-4">Something went wrong</h1>
      <p data-th-text="#{page.newsletter.newsletter-error.message}"
         class="subtitle mt-3"></p>
      <a data-th-href="@{/{language}/(language=${language})}"
         data-th-text="#{page.newsletter.back-home}"
         class="button is-primary mt-5">
        Return to home
      </a>
    </div>
  </section>
</main>

<footer data-th-replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
