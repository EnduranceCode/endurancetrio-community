<html data-th-lang="${#locale.language}" lang="en" class="has-endurance-navbar-fixed-top">
<head data-th-replace="~{fragments/head :: head(${metadata})}">
  <title></title>
</head>

<body>
<template data-th-replace="~{fragments/head :: googleTagManager}"></template>

<nav data-th-replace="~{fragments/main-navbar :: main-navbar(${metadata})}"></nav>

<main class="section">
  <section class="container is-fluid">
    <h1 data-th-text="#{page.insights.title}" class="title is-1">
      Insights
    </h1>

    <div data-th-if="${#lists.isEmpty(articles)}" data-th-remove="tag">
      <div class="endurance-box is-branded-thin has-text-centered">
        <p data-th-text="#{page.insights.empty}" class="title is-4 m-4"></p>
      </div>
    </div>

    <div data-th-unless="${#lists.isEmpty(articles)}" data-th-remove="tag">
      <div data-th-replace="~{fragments/insights-list :: insights-list(${language}, ${pagination}, ${articles}, '/insights')}">
      </div>
    </div>
  </section>
</main>

<footer data-th-replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
