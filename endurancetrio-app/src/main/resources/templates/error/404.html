      <div class="container has-text-centered">
        <p data-th-text="#{page.error.404.title}" class="title mt-6"></p>
      </div>
    </div>
  </div>

  <button class="button is-info is-light" data-modal="error-debug-modal"
          style="position:fixed;bottom:1rem;left:1rem;z-index:999">
                    <span class="icon">
                      <i class="et et-head-cog-outline"></i>
                    </span>
  </button>

  <div id="error-debug-modal" class="modal">
    <div class="modal-background"></div>
    <div class="modal-content">
      <article class="message is-info">
        <div class="message-header">
          <p>Error Details</p>
        </div>
        <div class="message-body has-text-dark">
          <p><strong>Status:</strong> <span data-th-text="${status}"></span></p>
          <p><strong>Reason:</strong> <span data-th-text="${reason}"></span></p>
          <p data-th-if="${message != null and !message.isEmpty()}"><strong>Message:</strong> <span
              data-th-text="${message}"></span>
          </p>

          <div data-th-if="${errors != null and !errors.isEmpty()}" class="content mt-5">
            <h6 class="title is-6 mb-3">Errors</h6>
            <ul>
              <li data-th-each="error : ${errors}" data-th-text="${error.message}"></li>
            </ul>
          </div>
        </div>
      </article>
    </div>

    <button class="modal-close is-large" aria-label="close"></button>
  </div>
</main>

<footer data-th-replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
