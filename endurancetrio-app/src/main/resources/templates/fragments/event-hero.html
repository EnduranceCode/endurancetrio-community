<html data-th-lang="${#locale.language}" lang="en" class="has-endurance-navbar-fixed-top">
<head>
  <title>Event Hero</title>
</head>

<body>
<section data-th-fragment="event-hero(event, language, year, currentTab)"
         class="hero has-background-grey-700">
  <div class="hero-body">
    <div class="container is-fullhd">
      <h1 class="title is-1" data-th-text="${event.title()}">Event Title</h1>

      <p class="subtitle is-3">
        <span
            data-th-text="${#temporals.format(event.startDate(), 'dd MMMM yyyy')}">15 August 1984</span>
        <span data-th-if="${!event.startDate().equals(event.endDate())}">
          - <span
            data-th-text="${#temporals.format(event.endDate(), 'dd MMM yyyy')}">16 August 1984</span>
        </span>
        <span> - </span>
        <span
            data-th-text="${event.city} + ', ' + ${event.county} + ' (' + ${event.district} + ')'">
          Peniche, Peniche (Leiria)
        </span>
      </p>
    </div>
  </div>

  <div class="hero-foot">
    <div class="container is-fullhd">
      <div class="tabs is-right">
        <ul>
          <li data-th-classappend="${currentTab == 'overview'} ? 'is-active' : ''">
            <a th:href="@{/{language}/events/{year}/{id}/overview(language=${language}, year=${year}, id=${event.id()})}"
               data-th-text="#{page.event.tab.overview}">Overview</a>
          </li>
          <li data-th-classappend="${currentTab == 'insights'} ? 'is-active' : ''">
            <a data-th-href="@{/{language}/events/{year}/{id}/insights(language=${language}, year=${year}, id=${event.id()})}"
               data-th-text="#{page.event.tab.insights}">Insights</a>
          </li>
          <li data-th-if="${event.races().size() > 0}"
              data-th-classappend="${currentTab == 'results'} ? 'is-active' : ''">
            <a data-th-href="@{/{language}/events/{year}/{eventId}/results/{raceId}(language=${language}, year=${year}, eventId=${event.id()}, raceId=${event.races().getFirst().id()})}"
               data-th-text="#{page.event.tab.results}">Results</a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</section>
</body>
</html>
