<!DOCTYPE html>
<html data-th-lang="${#locale.language}" lang="en" class="has-endurance-navbar-fixed-top">
<head>
  <title>Footer</title>
</head>

<body>
<footer data-th-fragment="footer" class="footer has-background-grey-700 pb-0">
  <div class="container">
    <div class="hero">
      <div class="hero-body">
        <figure class="image" style="width: 12rem; height: auto;">
          <svg data-th-replace="~{fragments/svg::endurancetrio-logo-fluid-white}"></svg>
        </figure>
        <p data-th-text="#{endurancetrio.tag-line}" class="subtitle mt-3"></p>
      </div>
    </div>

    <div class="section">
      <div class="columns is-8">
        <div class="column is-three-quarters">
          <form action="#">
            <div class="field is-grouped is-grouped-multiline">
              <p class="control is-expanded">
                <label class="label is-sr-only" for="newsletter-name"
                       data-th-text="#{footer.newsletter.name}">Name</label>
                <input id="newsletter-name" class="input" type="text"
                       data-th-placeholder="#{footer.newsletter.name}" placeholder="Name">
              </p>
              <p class="control is-expanded">
                <label class="label is-sr-only" for="newsletter-email"
                       data-th-text="#{footer.newsletter.email}">Email</label>
                <input id="newsletter-email" class="input" type="email"
                       data-th-placeholder="#{footer.newsletter.email}" placeholder="Email">
              </p>
              <p class="control is-expanded">
                <button class="button is-primary is-fullwidth">
                    <span class="icon">
                      <i class="et et-email-newsletter"></i>
                    </span>
                  <span data-th-text="#{footer.newsletter.subscribe}">Subscribe Newsletter</span>
                </button>
              </p>
            </div>
          </form>
        </div>
        <div class="column">
          <a class="button is-primary is-fullwidth"
             data-th-href="@{'https://ko-fi.com/' + ${metadata.kofiUserId}}"
             target="_blank" rel="noopener noreferrer">
              <span class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                     style="width: 100%; height: 100%;">
                  <mask id="kofi-mask" width="242" height="194" x="-1" y="0"
                        maskUnits="userSpaceOnUse">
                    <path fill="#fff" d="M240.469.959H-.006v192.959H240.47Z"/>
                  </mask>
                  <g mask="url(#kofi-mask)" transform="translate(0 2.275)scale(.0998)">
                    <path fill="#fff"
                          d="M96.134 193.911c-35.003 0-63.474-15.655-80.162-44.082C1.198 124.912-.006 97.923-.006 67.766c0-17.878 5.379-33.445 15.547-45.02 9.345-10.63 22.586-17.517 37.29-19.392C70.287 1.143 91.986.959 114.546.959c36.714 0 47.085.45 61.53 1.894 19.215 1.907 35.383 9.079 46.749 20.743 11.544 11.847 17.645 27.666 17.645 45.767v3.636c0 30.886-20.648 56.734-49.423 63.76-2.148 5.068-4.809 10.112-7.957 15.078l-.083.127c-10.137 15.668-33.964 41.954-79.605 41.954h-7.273z"/>
                    <path fill="#fff"
                          d="M174.568 17.977c-13.641-1.362-23.188-1.818-60.016-1.818-23.644 0-43.651.228-59.788 2.274-21.37 2.731-39.558 19.095-39.558 49.334s1.59 53.655 13.868 74.34c13.869 23.644 37.056 36.6 67.067 36.6h7.273c36.828 0 56.836-19.551 66.839-35.009 4.321-6.824 7.501-13.64 9.548-20.464 26.146-2.274 45.469-23.872 45.469-50.24v-3.636c0-28.415-18.639-48.194-50.696-51.38z"/>
                    <path fill="#202020"
                          d="M15.198 67.767c0-30.239 18.189-46.603 39.558-49.334 16.143-2.046 36.15-2.274 59.788-2.274 36.828 0 46.375.456 60.015 1.818 32.058 3.18 50.696 22.96 50.696 51.38v3.637c0 26.375-19.323 47.972-45.469 50.24-2.046 6.824-5.227 13.64-9.548 20.464-10.003 15.458-30.01 35.009-66.838 35.009h-7.274c-30.01 0-53.198-12.956-67.066-36.6-12.279-20.685-13.869-43.65-13.869-74.34"/>
                    <path fill="#fff"
                          d="M32.247 67.99c0 29.327 1.818 48.194 11.366 65.699 10.91 20.235 30.689 27.964 53.199 27.964h7.045c29.554 0 43.879-14.324 51.836-26.824 3.865-6.367 7.273-13.412 9.091-22.282l1.363-5.683h8.185c18.189 0 33.876-14.774 33.876-33.647v-3.409c0-21.141-13.184-32.285-36.15-35.01-12.956-1.133-20.686-1.59-57.52-1.59-24.778 0-42.51.228-55.923 2.275-18.867 2.73-26.374 13.412-26.374 32.507"/>
                    <path fill="#202020"
                          d="M166.158 83.68c0 2.73 2.046 4.777 5.683 4.777 11.594 0 17.961-6.595 17.961-17.505s-6.367-17.732-17.961-17.732c-3.637 0-5.683 2.046-5.683 4.776v25.69z"/>
                    <path fill="#ff5a16"
                          d="M54.532 82.32c0 13.412 7.501 25.006 17.049 34.104 6.367 6.138 16.37 12.506 23.188 16.598 2.046 1.135 4.092 1.819 6.367 1.819 2.73 0 4.998-.684 6.823-1.819 6.823-4.092 16.82-10.46 22.96-16.598 9.775-9.092 17.276-20.686 17.276-34.104 0-14.553-10.909-27.509-26.596-27.509-9.319 0-15.687 4.777-20.463 11.366-4.321-6.595-10.91-11.366-20.236-11.366-15.915 0-26.374 12.956-26.374 27.509z"/>
                  </g>
                </svg>
              </span>
            <span data-th-text="#{footer.ko-fi.support}">Make a donation</span>
          </a>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="level">
        <div class="level-item has-text-centered is-uppercase">
          <a data-th-href="@{/{language}/privacy-policy#privacy-policy(language=${language})}"
             data-th-text="#{page.policy.section.privacy}">
            Privacy Policy
          </a>
        </div>
        <div class="level-item has-text-centered is-uppercase">
          <a data-th-href="@{/{language}/privacy-policy#cookies-policy(language=${language})}"
             data-th-text="#{page.policy.section.cookies}">
            Cookie Policy
          </a>
        </div>
        <div class="level-item has-text-centered is-uppercase">
          <a id="cookies-preferences-link"
             data-th-text="#{footer.cookies-preferences}">
            Cookie Preferences
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="level">
      <div class="level-left">
        <div class="level-item">
          <p class="is-size-7 has-text-centered-mobile">© <span
              data-th-text="${metadata.copyrightYear}">2011-2026</span> <a
              data-th-href="@{/{language}/(language=${language})}">EnduranceTrio</a> - <span
              data-th-text="#{footer.copyright}">All rights reserved.</span>
          </p>
        </div>
      </div>
      <div class="level-right">
        <div class="level-item">
          <p class="is-size-7">EnduranceTrio Community <span
              data-th-text="${metadata.appVersion}"></span></p>
        </div>
      </div>
    </div>
  </div>
</footer>
</body>
</html>
