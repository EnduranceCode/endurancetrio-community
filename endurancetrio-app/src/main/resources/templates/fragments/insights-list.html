<html data-th-lang="${#locale.language}" lang="en" class="has-endurance-navbar-fixed-top">
<head>
  <title>Insights List</title>
</head>

<body>
<div data-th-fragment="insights-list(language, pagination, articles, baseUrl)" data-th-remove="tag">
  <div class="columns is-multiline">
    <div data-th-each="article : ${articles}" class="column is-half">
      <div class="card">
        <div data-th-if="${article.featuredImage != null}" class="card-image">
          <figure class="image">
            <img data-th-src="${article.featuredImage}"
                 data-th-alt="${article.title}"
                 alt="Article Title"/>
          </figure>
        </div>
        <div data-th-unless="${article.featuredImage != null}" class="card-image">
          <figure class="image">
            <img data-th-src="@{/img/endurancetrio-open-graph.png}"
                 data-th-alt="${article.title}"
                 alt="Article Title"/>
          </figure>
        </div>
        <div class="card-content">
          <a data-th-href="@{/{lang}/insights/{slug}(lang=${language}, slug=${article.slug})}">
            <div class="mb-3">
              <p data-th-text="${article.title}" class="title is-3"></p>
              <p data-th-text="${article.authorName}" class="subtitle is-5"></p>
            </div>
          </a>
          <p data-th-utext="${article.introText}" data-th-remove="tag"></p>
        </div>
        <footer class="card-footer">
          <a data-th-href="@{/{lang}/insights/{slug}(lang=${language}, slug=${article.slug})}"
             data-th-text="#{page.insights.detail.read.more}"
             class="card-footer-item">
          </a>
        </footer>
      </div>
    </div>
  </div>

  <nav class="pagination is-centered is-rounded" role="navigation"
       data-th-if="${pagination.totalPages() > 1}">
    <a class="pagination-previous"
       data-th-classappend="${!pagination.hasPrevious()} ? 'is-disabled'"
       data-th-attr="disabled=${!pagination.hasPrevious()} ? 'disabled' : null"
       data-th-href="${pagination.hasPrevious()}
            ? @{/{lang}${baseUrl}(lang=${language}, page=${pagination.pageNumber() - 1})}
            : null">
        <span class="icon">
          <i class="et et-chevron-double-left"></i>
        </span>
    </a>

    <a class="pagination-next"
       data-th-classappend="${!pagination.hasNext()} ? 'is-disabled'"
       data-th-attr="disabled=${!pagination.hasNext()} ? 'disabled' : null"
       data-th-href="${pagination.hasNext()}
            ? @{/{lang}${baseUrl}(lang=${language}, page=${pagination.pageNumber() + 1})}
            : null">
        <span class="icon">
          <i class="et et-chevron-double-right"></i>
        </span>
    </a>
  </nav>
</div>
</body>
</html>
