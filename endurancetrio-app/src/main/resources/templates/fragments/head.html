<!DOCTYPE html>
<html data-th-lang="${#locale.language}" lang="en" class="has-endurance-navbar-fixed-top">
<head data-th-fragment="head(metadata)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title data-th-text="${metadata.title}"></title>

  <meta name="color-scheme" content="light">
  <meta name="description" data-th-content="${metadata.description}">
  <meta name="format-detection" content="telephone=no">
  <meta name="google-adsense-account" data-th-content="${metadata.googleAdsenseId}">
  <meta name="robots" content="index,follow">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" data-th-content="${metadata.twitterSite}">

  <meta property="og:title" data-th-content="${metadata.title}">
  <meta property="og:description" data-th-content="${metadata.description}">
  <meta property="og:type" content="website">
  <meta property="og:url" data-th-content="${metadata.canonicalUrl}">
  <meta property="og:site_name" content="EnduranceTrio">
  <meta property="og:locale" data-th-content="${#locale}">
  <meta property="og:image" data-th-content="${metadata.ogImage}">
  <meta property="og:image:width" data-th-content="${metadata.ogImageWidth}">
  <meta property="og:image:height" data-th-content="${metadata.ogImageHeight}">
  <meta property="fb:pages" data-th-content="${metadata.facebookPageId}">

  <!-- Google Tag Manager -->
  <script data-type="application/javascript" type="text/plain" data-name="google-tag-manager">
    (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-KK23WCG6');
  </script>
  <!-- End Google Tag Manager -->

  <link rel="canonical" data-th-href="${metadata.canonicalUrl}">
  <link rel="icon" data-th-href="@{/favicon.ico}" sizes="32x32">
  <link rel="icon" data-th-href="@{/favicon.svg}" type="image/svg+xml">
  <link rel="apple-touch-icon" data-th-href="@{/apple-touch-icon.png}">

  <link rel="stylesheet" data-th-href="@{/css/style.css}">
  <script defer="defer" data-th-src="@{/js/script.js}"></script>

  <script th:if="${@environment.acceptsProfiles('local')}">
    (function () {
      // Connects to Spring Boot DevTools' embedded LiveReload WebSocket server.
      // The protocol identifier below is a URN used in the LiveReload handshake —
      // it is NOT fetched from any domain (no network call to livereload.com).
      var ws = new WebSocket('ws://localhost:35729/livereload');
      ws.onopen = function () {
        ws.send(JSON.stringify({
          command: 'hello',
          protocols: ['http://livereload.com/protocols/official-7'],
          serverName: 'browser'
        }));
      };
      ws.onmessage = function (event) {
        try {
          var msg = JSON.parse(event.data);
          if (msg.command === 'reload') {
            location.reload();
          }
        } catch (e) {
        }
      };
      ws.onclose = function () {
        setTimeout(function () {
          location.reload();
        }, 1500);
      };
    })();
  </script>
</head>

<body>
<template data-th-fragment="googleTagManager">
  <!-- Google Tag Manager (noscript) -->
  <noscript>
    <iframe
        title="Google Tag Manager"
        data-name="google-tag-manager"
        data-src="https://www.googletagmanager.com/ns.html?id=GTM-KK23WCG6"
        height="0"
        width="0"
        style="display:none;visibility:hidden"
    >
    </iframe>
  </noscript>
  <!-- End Google Tag Manager (noscript) -->
</template>
</body>
</html>
