<html data-th-lang="${#locale.language}" lang="en" class="has-endurance-navbar-fixed-top">
<head>
  <title>Calendar</title>
</head>

<body>
<div data-th-fragment="date-ddmmyyyy(date)"
     class="box has-background-grey-600 has-text-centered p-3"
>
  <p data-th-text="${#temporals.format(date, 'dd-MM')}" class="title is-5 mb-1"></p>
  <p data-th-text="${#temporals.format(date, 'yyyy')}" class="title is-5 mb-0"></p>
</div>

<div data-th-fragment="date-ddmmm(date)"
     class="box has-background-grey-600 has-text-centered py-3 px-5"
>
  <p data-th-text="${#temporals.format(date, 'dd')}" class="title is-4 mb-1"></p>
  <p data-th-text="${#temporals.format(date, 'MMM')}" class="title is-6 mb-0"></p>
</div>

<div data-th-fragment="date-ddmmhhmm(date, time)"
     class="box has-background-grey-600 has-text-centered py-3 px-3"
>
  <p data-th-text="${#temporals.format(date, 'dd-MM')}"
     class="title is-4 mb-1"
  ></p>
  <p data-th-if="${time != null}"
     data-th-text="${#temporals.format(race.time, 'HH:mm')}"
     class="title is-3 mb-0"
  ></p>
</div>
</body>
</html>
