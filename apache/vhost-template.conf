#
# Apache Virtual Host Configuration Template
# ==========================================
#
# This file serves as a template for the configuration of the Apache server as a reverse proxy
# for the EnduranceTrio application. It handles the following subdomains:
#
#   Subdomain              Purpose
#   ----------             -------
#   www.<SECOND_LEVEL_DOMAIN_SLD>.<TOP_LEVEL_DOMAIN_TLD>        Redirects to the naked domain
#   <SECOND_LEVEL_DOMAIN_SLD>.<TOP_LEVEL_DOMAIN_TLD>            Production web application
#   api.<SECOND_LEVEL_DOMAIN_SLD>.<TOP_LEVEL_DOMAIN_TLD>        Production API (proxied to /api/)
#   openapi.<SECOND_LEVEL_DOMAIN_SLD>.<TOP_LEVEL_DOMAIN_TLD>    Swagger UI (rewrites / to /swagger-ui/index.html)
#   docs.<SECOND_LEVEL_DOMAIN_SLD>.<TOP_LEVEL_DOMAIN_TLD>       JavaDoc static website
#   stg.<SECOND_LEVEL_DOMAIN_SLD>.<TOP_LEVEL_DOMAIN_TLD>        Staging environment (Basic Auth, noindex)
#
# REPLACEMENT GUIDE:
# ------------------
# Replace ALL placeholder tags <PLACEHOLDER> with your actual values:
#
# DOMAIN CONFIGURATION:
#   <SECOND_LEVEL_DOMAIN_SLD>  - Your domain name (e.g., 'example' in example.com)
#   <TOP_LEVEL_DOMAIN_TLD>     - Your top-level domain (e.g., 'com', 'org', 'net')
#
# SERVER ADMIN:
#   <SERVER_ADMIN_EMAIL>       - Administrator email for server notifications
#
# APPLICATION PORTS:
#   <STG_ENDURANCETRIO_EXT_PORT> - External port for staging app (e.g., 8081)
#   <PRD_ENDURANCETRIO_EXT_PORT> - External port for production app (e.g., 8080)
#
# REQUIRED APACHE MODULES:
# ------------------------
# sudo a2enmod proxy
# sudo a2enmod proxy_http
# sudo a2enmod headers
# sudo a2enmod rewrite
# sudo systemctl restart apache2
#
# NOTE:
# This template starts with HTTP virtual hosts on port 80 so initial validation can be
# completed before certificate provisioning. After running Certbot, keep redirects and
# forwarded headers aligned with HTTPS (`https` / `443`) as described in docs/deployment.md.

# --------------------------------------------------------------------------------------------------
# WWW to non-WWW redirects
# --------------------------------------------------------------------------------------------------
#

<VirtualHost *:80>
    ServerName www.<SECOND_LEVEL_DOMAIN_SLD>.<TOP_LEVEL_DOMAIN_TLD>
    Redirect permanent / http://<SECOND_LEVEL_DOMAIN_SLD>.<TOP_LEVEL_DOMAIN_TLD>/
</VirtualHost>

# --------------------------------------------------------------------------------------------------
# Static Configuration
# --------------------------------------------------------------------------------------------------
#

# JavaDoc Documentation Subdomain
<VirtualHost *:80>
    ServerName docs.<SECOND_LEVEL_DOMAIN_SLD>.<TOP_LEVEL_DOMAIN_TLD>

    ServerAdmin <SERVER_ADMIN_EMAIL>

    # Path where the generated JavaDoc HTML is deployed
    DocumentRoot /srv/www/endurancetrio-docs

    <Directory /srv/www/endurancetrio-docs>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Headers configuration
    Header always set X-Robots-Tag "index, follow"

    ErrorLog ${APACHE_LOG_DIR}/docs_<SECOND_LEVEL_DOMAIN_SLD>_error.log
    CustomLog ${APACHE_LOG_DIR}/docs_<SECOND_LEVEL_DOMAIN_SLD>_access.log combined
</VirtualHost>

# --------------------------------------------------------------------------------------------------
# Reverse Proxy Configuration
# --------------------------------------------------------------------------------------------------
#

# Main domain — production web application
<VirtualHost *:80>
    ServerName <SECOND_LEVEL_DOMAIN_SLD>.<TOP_LEVEL_DOMAIN_TLD>

    ServerAdmin <SERVER_ADMIN_EMAIL>

    ProxyRequests Off

    # Connection Settings
    KeepAlive On
    KeepAliveTimeout 5
    MaxKeepAliveRequests 100
    Timeout 300

    # Forwarding configuration
    ProxyPreserveHost On
    ProxyPass / http://localhost:<PRD_ENDURANCETRIO_EXT_PORT>/
    ProxyPassReverse / http://localhost:<PRD_ENDURANCETRIO_EXT_PORT>/

    # Headers configuration
    # Initial setup values (HTTP). Update to https/443 after SSL setup.
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    ErrorLog ${APACHE_LOG_DIR}/<SECOND_LEVEL_DOMAIN_SLD>_error.log
    CustomLog ${APACHE_LOG_DIR}/<SECOND_LEVEL_DOMAIN_SLD>_access.log combined
</VirtualHost>

# API Subdomain (production)
<VirtualHost *:80>
    ServerName api.<SECOND_LEVEL_DOMAIN_SLD>.<TOP_LEVEL_DOMAIN_TLD>

    ServerAdmin <SERVER_ADMIN_EMAIL>

    ProxyRequests Off

    # Connection Settings
    KeepAlive On
    KeepAliveTimeout 5
    MaxKeepAliveRequests 100
    Timeout 300

    # Forwarding configuration
    ProxyPreserveHost On
    ProxyPass / http://localhost:<PRD_ENDURANCETRIO_EXT_PORT>/api/
    ProxyPassReverse / http://localhost:<PRD_ENDURANCETRIO_EXT_PORT>/api/

    # Headers configuration
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    ErrorLog ${APACHE_LOG_DIR}/api_<SECOND_LEVEL_DOMAIN_SLD>_error.log
    CustomLog ${APACHE_LOG_DIR}/api_<SECOND_LEVEL_DOMAIN_SLD>_access.log combined
</VirtualHost>

# OpenAPI Subdomain (Swagger UI - production)
<VirtualHost *:80>
    ServerName openapi.<SECOND_LEVEL_DOMAIN_SLD>.<TOP_LEVEL_DOMAIN_TLD>

    ServerAdmin <SERVER_ADMIN_EMAIL>

    ProxyRequests Off

    # Connection Settings
    KeepAlive On
    KeepAliveTimeout 5
    MaxKeepAliveRequests 100
    Timeout 300

    # Rewrite configuration
    RewriteEngine On
    RewriteRule ^/$ /swagger-ui/index.html [R=302,L]

    # Forwarding configuration
    ProxyPreserveHost On
    ProxyPass / http://localhost:<PRD_ENDURANCETRIO_EXT_PORT>/
    ProxyPassReverse / http://localhost:<PRD_ENDURANCETRIO_EXT_PORT>/

    # Headers configuration
    # Initial setup values (HTTP). Update to https/443 after SSL setup.
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    ErrorLog ${APACHE_LOG_DIR}/openapi_<SECOND_LEVEL_DOMAIN_SLD>_error.log
    CustomLog ${APACHE_LOG_DIR}/openapi_<SECOND_LEVEL_DOMAIN_SLD>_access.log combined
</VirtualHost>

# Staging Environment (Basic Auth, noindex, offline fallback)
<VirtualHost *:80>
    ServerName stg.<SECOND_LEVEL_DOMAIN_SLD>.<TOP_LEVEL_DOMAIN_TLD>

    ServerAdmin <SERVER_ADMIN_EMAIL>

    ProxyRequests Off
    ProxyPreserveHost On

    # Connection Settings
    KeepAlive On
    KeepAliveTimeout 5
    MaxKeepAliveRequests 100
    Timeout 300

    # Apache HTTP Basic Authentication
    # ---------------------------------
    # Generate the htpasswd file with:
    #   sudo htpasswd -c /etc/apache2/.htpasswd-staging <username>
    #
    # Add more users (without -c to avoid overwriting):
    #   sudo htpasswd /etc/apache2/.htpasswd-staging <another-username>
    #
    # Ensure the file is readable by the Apache user (www-data):
    #   sudo chown www-data:www-data /etc/apache2/.htpasswd-staging
    #   sudo chmod 640 /etc/apache2/.htpasswd-staging

    <Location />
        AuthType Basic
        AuthName "Staging Environment — Authorised Access Only"
        AuthUserFile /etc/apache2/.htpasswd-staging
        Require valid-user
    </Location>

    # Allow the offline fallback page to be served without re-authentication.
    # <Location> sections are merged in order; this more-specific path overrides
    # the Require valid-user set by <Location /> above.
    <Location /index.html>
        Require all granted
    </Location>

    # Disallow search engine crawling
    Header always set X-Robots-Tag "noindex, nofollow"

    # Offline fallback page
    # ----------------------
    # When the staging container is stopped (docker compose stop ...), ProxyPass
    # returns a 502/503 error. The configuration below serves a static HTML page
    # instead. Create the directory and download the index.html file:
    #
    #   sudo mkdir -p /srv/www/endurancetrio
    #   sudo wget -P /srv/www/endurancetrio \
    #     https://raw.githubusercontent.com/EnduranceCode/endurancetrio-community/refs/heads/master/apache/index.html
    #
    # To take staging offline:
    #   docker compose -p endurancetrio-community stop stg-endurancetrio-community
    #
    # To bring it back:
    #   docker compose -p endurancetrio-community up -d stg-endurancetrio-community

    ProxyErrorOverride On
    ErrorDocument 502 /index.html
    ErrorDocument 503 /index.html
    Alias /index.html /srv/www/endurancetrio/index.html
    <Directory /srv/www/endurancetrio>
        Require all granted
    </Directory>

    # Exclude /index.html from proxying so ErrorDocument handles it locally
    ProxyPass /index.html !

    # Forwarding to staging application
    ProxyPass / http://localhost:<STG_ENDURANCETRIO_EXT_PORT>/
    ProxyPassReverse / http://localhost:<STG_ENDURANCETRIO_EXT_PORT>/

    # Headers configuration
    # Initial setup values (HTTP). Update to https/443 after SSL setup.
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    ErrorLog ${APACHE_LOG_DIR}/stg_<SECOND_LEVEL_DOMAIN_SLD>_error.log
    CustomLog ${APACHE_LOG_DIR}/stg_<SECOND_LEVEL_DOMAIN_SLD>_access.log combined
</VirtualHost>
